<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="google" content="notranslate" />

    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Aurelius Capital | Institutional-Grade AI Asset Management</title>

    <link rel="stylesheet" href="/src/index.css" />

    <meta
      name="title"
      content="Aurelius Capital | Institutional-Grade AI Asset Management"
    />
    <meta
      name="description"
      content="Secure your financial legacy with Aurelius Capital. Experience precision-driven wealth growth powered by advanced AI algorithmic models and global market insights."
    />

    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://aurelius.capital/" />
    <meta
      property="og:title"
      content="Aurelius Capital | Precision AI Trading"
    />
    <meta
      property="og:description"
      content="Where Intelligence Meets Capital. Join 124,000+ investors using institutional-grade AI to grow sustainable wealth."
    />
    <meta property="og:image" content="/og-image.png" />
    <meta property="twitter:card" content="summary_large_image" />
    <meta
      property="twitter:title"
      content="Aurelius Capital | AI Wealth Management"
    />
    <meta
      property="twitter:description"
      content="Access elite asset management strategies previously reserved for billion-dollar hedge funds."
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #05070a;
      }
      ::-webkit-scrollbar-thumb {
        background: #1e293b;
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #38bdf8;
      }

      /* 3. Pro Tip: Hide the default Google Translate button so it doesn't 
         ruin your UI. We will trigger it via code instead. */
      #google_translate_element {
        display: none !important;
      }
      /* 1. Hide the injected iframe entirely */
      iframe.skiptranslate,
      .goog-te-banner-frame,
      .goog-te-banner-frame.skiptranslate {
        display: none !important;
        visibility: hidden !important;
      }

      /* 2. Force the body back to the top of the screen */
      body {
        top: 0px !important;
        position: static !important; /* Some Google scripts force 'relative' */
      }

      /* 3. Remove the tooltip that appears on hover */
      #goog-gt-tt,
      .goog-te-balloon-frame {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <div id="google_translate_element"></div>

    <div id="root"></div>

    <script type="text/javascript">
      function googleTranslateElementInit() {
        new google.translate.TranslateElement(
          {
            pageLanguage: "en",
            layout: google.translate.TranslateElement.InlineLayout.TOP_BANNER,
            autoDisplay: false,
          },
          "google_translate_element",
        );
      }
    </script>
    <script
      type="text/javascript"
      src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"
    ></script>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
